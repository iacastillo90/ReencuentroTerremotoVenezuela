# ================================================================
# REENCUENTRO TERREMOTOS VENEZUELA — Orquestador de Infraestructura
# ================================================================
# Ecosistema completo desacoplado:
#   mongodb  → Base de datos central
#   redis    → Motor de colas BullMQ + caché de respuestas
#   minio    → Almacenamiento seguro local de fotos y videos
#   api      → Servidor Express (recibe tráfico de usuarios)
#   worker   → Worker BullMQ (procesa IA en segundo plano)
#
# Uso:
#   Desarrollo:  docker compose up -d
#   Producción:  docker compose up -d --build
# ================================================================

services:

  # ── 1. Base de Datos Central ─────────────────────────────────
  mongodb:
    image: mongo:4.4
    container_name: reencuentros_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 2. Redis (Colas BullMQ + Caché) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: reencuentros_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. MinIO (Fotos y Videos Seguros, Locales) ────────────────
  minio:
    image: minio/minio:latest
    container_name: reencuentros_minio
    restart: always
    ports:
      - "9000:9000"  # API S3-compatible
      - "9001:9001"  # Consola de administración web
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── 4. API Principal (Tráfico de usuarios) ───────────────────
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: reencuentros-api:latest
    container_name: reencuentros_api
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./back/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/reencuentro
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      VISION_SERVICE_URL: http://vision:8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 5. Worker de IA (BullMQ, segundo plano) ──────────────────
  # Usa la misma imagen que la API pero con un CMD diferente.
  # Si la IA consume 100% de CPU, la API sigue respondiendo sin interrupciones.
  worker:
    image: reencuentros-api:latest
    container_name: reencuentros_worker
    restart: always
    command: ["node", "dist/src/workers/ia-processor.worker.js"]
    env_file:
      - ./back/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/reencuentro
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      VISION_SERVICE_URL: http://vision:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    # El worker puede escalar horizontalmente si hay alta demanda:
    # docker compose up -d --scale worker=3

  # ── 6. Visión Artificial (face_recognition) ─────────────────
  # Microservicio Python/FastAPI para extraer vectores faciales.
  # Corre en CPU. No requiere GPU. Procesa ~1-3s por foto.
  # Si falla o no detecta rostro, el worker de IA lo ignora gracefulmente.
  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    image: reencuentros-vision:latest
    container_name: reencuentros_vision
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

# ── Volúmenes Persistentes ────────────────────────────────────
# Los datos de personas sobreviven a reinicios y actualizaciones
volumes:
  mongo_data:
  redis_data:
  minio_data:
